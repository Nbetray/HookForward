server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://frontend:80;
    }

    location /api/ {
        proxy_pass http://backend:8080;
    }

    location /healthz {
        proxy_pass http://backend:8080;
    }

    location /webhook/ {
        proxy_pass http://backend:8080;
    }

    location /ws/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_pass http://backend:8080;
    }
}
